name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: ''

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run linting
        run: uv run --frozen ruff check packages/ services/ tests/

      - name: Run type checking
        run: uv run --frozen mypy packages/ services/

      - name: Run tests
        run: uv run --frozen pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha,scope=base,cache-key-prefix=ainstruct-mcp
          cache-to: type=gha,scope=base,mode=max,cache-key-prefix=ainstruct-mcp
