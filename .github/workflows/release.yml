name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: ''

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --package semantic-release \
            --package @semantic-release/commit-analyzer \
            --package @semantic-release/release-notes-generator \
            --package @semantic-release/changelog \
            --package @semantic-release/git \
            --package @semantic-release/exec \
            --package conventional-changelog-conventionalcommits \
            semantic-release

          if [ -f .release-version ]; then
            VERSION=$(cat .release-version)
            printf '%s\n' "new_release_published=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "new_release_published=false" >> "$GITHUB_OUTPUT"
            printf '%s\n' "new_release_version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=raw,value=latest

      - name: Build and push
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base,cache-key-prefix=ainstruct-mcp
          cache-to: type=gha,scope=base,mode=max,cache-key-prefix=ainstruct-mcp
