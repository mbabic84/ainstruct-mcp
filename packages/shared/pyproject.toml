[project]
name = "ainstruct-shared"
version = "3.5.0"
description = "Shared code for ainstruct services"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "python-dotenv>=1.2.2",
    "SQLAlchemy>=2.0.49",
    "asyncpg>=0.31.0",
    "psycopg2-binary>=2.9.12",
    "alembic>=1.18.0",
    "qdrant-client>=1.17.1",
    "bcrypt>=5.0.0",
    "PyJWT>=2.12.1",
    "tiktoken>=0.12.0",
    "httpx>=0.28.1",
    "PyYAML>=6.0.3",
    "email-validator>=2.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]

[tool.hatch.package.data]
shared = ["src/shared/**/*"]
