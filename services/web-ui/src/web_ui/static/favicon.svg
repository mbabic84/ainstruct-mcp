<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke="#d4d4d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <!-- Clip path: everything OUTSIDE the center document -->
    <clipPath id="clipLeft">
      <rect x="0" y="0" width="37" height="128"/>
      <rect x="91" y="0" width="37" height="128"/>
      <rect x="37" y="0" width="54" height="18"/>
      <rect x="37" y="88" width="54" height="40"/>
    </clipPath>
    <clipPath id="clipRight">
      <rect x="0" y="0" width="37" height="128"/>
      <rect x="91" y="0" width="37" height="128"/>
      <rect x="37" y="0" width="54" height="18"/>
      <rect x="37" y="88" width="54" height="40"/>
    </clipPath>
  </defs>

  <g transform="translate(61, 61) scale(1.15) translate(-64, -54)">
  <!-- Left document (tilted left, clipped behind center, smaller) -->
  <g clip-path="url(#clipLeft)">
    <g transform="rotate(-12, 64, 85)" stroke-width="2.5">
      <rect x="30" y="30" width="44" height="58" rx="3"/>
      <!-- Text lines -->
      <line x1="36" y1="42" x2="56" y2="42" stroke-width="2"/>
      <line x1="36" y1="49" x2="62" y2="49" stroke-width="2"/>
      <line x1="36" y1="56" x2="54" y2="56" stroke-width="2"/>
    </g>
  </g>

  <!-- Right document (tilted right, clipped behind center, slightly different) -->
  <g clip-path="url(#clipRight)">
    <g transform="rotate(15, 64, 85)" stroke-width="2.5">
      <rect x="52" y="26" width="48" height="62" rx="3"/>
      <!-- Text lines -->
      <line x1="68" y1="38" x2="90" y2="38" stroke-width="2"/>
      <line x1="68" y1="45" x2="94" y2="45" stroke-width="2"/>
      <line x1="68" y1="52" x2="88" y2="52" stroke-width="2"/>
      <line x1="68" y1="59" x2="92" y2="59" stroke-width="2"/>
      <line x1="68" y1="66" x2="86" y2="66" stroke-width="2"/>
    </g>
  </g>

  <!-- Center document (upright, in front) -->
  <rect x="37" y="18" width="54" height="70" rx="3"/>

  <!-- Cloud inside center document (centered on document) -->
  <g transform="translate(67, 53)">
    <path d="M-15 11c-4 0-7.2-3.3-7.2-7.2 0-3.3 2.2-6 5.2-6.9
      C-17.2-3.8-17.3-4.4-17.3-5c0-5.1 4.2-9.3 9.3-9.3
      c3.4 0 6.3 1.8 7.9 4.5C1.2-10.8 2.5-11.3 4-11.3
      c4.2 0 7.6 3.4 7.6 7.6 0 .4 0 .8-.1 1.1
      C14.2-1.3 16 1.3 16 4.3c0 3.6-2.9 6.7-6.5 6.7H-15z"/>
  </g>
  </g>
</svg>
